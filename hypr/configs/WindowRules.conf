# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# JaKooLit Github - https://github.com/JaKooLit

windowrule = float true, match:class org.kde.polkit-kde-authentication-agent-1
windowrule = float true, match:class nm-connection-editor|blueman-manager
windowrule = float true, match:class Viewnior|pavucontrol
windowrule = float true, match:class nwg-look|qt5ct|mpv
windowrule = float true, match:class onedriver|onedriver-launcher
windowrule = float true, match:class swayimg|zoom
windowrule = float true, match:class wofi
# windowrule = float true, match:class  rofi
# windowrule = center, match:class  rofi
# windowrule = forceinput, match:class ^([Rr]ofi)$
windowrule = animation popin, match:class ^([Rr]ofi)$
windowrule = float true, match:class gnome-system-monitor
windowrule = float true, match:class qimgv
windowrule = float true, match:class albert
windowrule = stay_focused yes, match:class albert
windowrule = float true, match:class showmethekey-gtk
#windowrule = pin, match:class  showmethekey-gtk
windowrule = size 370 73, match:class ^(showmethekey-gtk)
windowrule = move 1552 -15, match:class ^(showmethekey-gtk)

windowrule = float true, match:title (Select)
windowrule = float true, match:title (Ark)
windowrule = float true, match:title (Eclipse Marketplace)

#windowrule = noblur,gamescope
#windowrule = fullscreen,gamescope
#windowrule = workspace 6 silent,^(gamescope)$

# windowrule = move 1380 495, match:class  ^(pavucontrol) # Make sure to change these valuers
windowrule = center yes, match:class  ^(pavucontrol) # Make sure to delete this line if uncommen the line above
#windowrule = size 533 533, match:class  ^(pavucontrol) # These are optionals. But recommended

# windowrule v2
windowrule = workspace 1, match:class ^(thunderbird)$
windowrule = workspace 1 silent, match:class ^(Eclipse)$
windowrule = workspace 1 silent, match:title (Eclipse)
#windowrule = workspace 1 silent, match:class ^(jetbrains-idea)
#windowrule = workspace 2, match:class ^(firefox)$
#windowrule = workspace 2, match:class ^(Firefox-esr)$
windowrule = workspace 2, match:class ^(Microsoft-edge-beta)$ #this is on arch
#windowrule = workspace 2, match:class ^([Tt]hunar)$
windowrule = workspace 3 silent, match:class ^([Dd]iscord)$
windowrule = workspace 3 silent, match:class ^([Vv]encord)$
windowrule = workspace 3 silent, match:class ^([Vv]esktop)$
windowrule = workspace 3 silent, match:class ^([Vv]encord[Dd]esktop)$
windowrule = workspace 3 silent, match:class ^(WebCord)$
windowrule = workspace 4 silent, match:title ^([Yy]ou[Tt]ube [Mm]usic)$
windowrule = workspace 4 silent, match:class ^([Ss]potify)$
windowrule = workspace 4 silent, match:class ^([Ss]potify-[Ll]auncher)$
windowrule = workspace 4 silent, match:class ^([Ss]potify ([Ll]auncher))$
windowrule = workspace 5 silent, match:class ^(com.obsproject.Studio)$
windowrule = workspace 6 silent, match:class ^([Ss]team)$,match:title ^([Ss]team)$
windowrule = workspace 6, match:class ^(virt-manager)$
windowrule = workspace 6 silent, match:class ^(lutris)$
windowrule = workspace 9 silent, match:class ^(audacious)$
windowrule = workspace 10 silent, match:class ^(one.alynx.showmethekey)$

#opacity (transparent) #enable as desired
windowrule = opacity 0.9 0.8, match:class ^(firefox)$
windowrule = opacity 0.7 0.7, match:class ^([Tt]hunar)$
windowrule = opacity 0.8 0.7, match:class ^(foot)$
windowrule = opacity 0.9 0.7, match:class ^(kitty)$
windowrule = opacity 0.0 0.0, match:class ^(tmux)$
windowrule = opacity 0.8 0.7, match:class ^(mousepad)$
windowrule = opacity 0.9 0.7, match:class ^(codium-url-handler)$
windowrule = opacity 0.9 0.7, match:class ^(VSCodium)$
windowrule = opacity 0.7 0.6, match:class ^([Vv]encord)
windowrule = opacity 0.7 0.6, match:class ^([Vv]esktop)
windowrule = opacity 0.7 0.6, match:class ^([Dd]iscord)
windowrule = opacity 0.7 0.6, match:title ^([Yy]ou[Tt]ube [Mm]usic)
windowrule = opacity 0.7 0.6, match:class ^([Ss]potify)
windowrule = opacity 0.8 0.8, match:class ^([Ss]kype)
windowrule = opacity 0.8 0.8, match:class ^(Code)
windowrule = opacity 0.8 0.7, match:class ^(Eclipse)
windowrule = opacity 0.8 0.8, match:class ^(jetbrains-idea)
windowrule = opacity 0.8 0.7, match:class ^(Postman)
windowrule = opacity 0.8 0.7, match:class ^(Neo4j Desktop)
windowrule = opacity 0.8 0.7, match:class ^(Mysql-workbench-bin)
windowrule = opacity 0.8 0.7, match:class ^(SWT)
windowrule = opacity 0.6 0.7, match:class ^(polkit)
windowrule = opacity 0.6 0.6, match:class ^(Pinentry-gtk-2)
windowrule = opacity 0.8 0.7, match:title (Pentaho Report Designer)
windowrule = opacity 0.8 0.7, match:title (Oracle SQL Developer)
windowrule = opacity 0.7 0.6, match:class ^(org.kde.polkit-kde-authentication-agent-1)
#windowrule = opacity 0.9 0.8, match:class (Google-chrome)
windowrule = opacity 0.3 override 0.3 override, match:title (.*)(- Youtube)$
#windowrule = opacity 0.8 0.8,match:class ^(wofi|thunar|discord|Code)$
windowrule = opacity 0.7 0.7, match:class ^(showmethekey-gtk)$

#windowrule = bordercolor rgb(EE4B55) rgb(880808), fullscreen:1
#windowrule = bordercolor rgb(282737) rgb(1E1D2D), float trueing:1
#windowrule = opacity 0.8 0.8, pinned:1

#Layer rules
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace ^(waybar)$
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.2, match:namespace swaync-control-center
layerrule = animation fade, match:namespace swaync-control-center
layerrule = animation fade, match:namespace wlogout
layerrule = animation popin, match:namespace rofi
#layerrule = blur, notifications
#layerrule = ignorealpha 0.7, notifications
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.4, match:namespace swaync-notification-window